<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#5E072B"/>

  <!-- Tornado funnel: stacked tapering ellipses, widest at top, narrow at bottom -->
  <g>
    <ellipse cx="32" cy="14" rx="19" ry="4.5" fill="#FFFFFF"/>
    <ellipse cx="32" cy="21" rx="16" ry="4" fill="#A2AAAD"/>
    <ellipse cx="33" cy="28" rx="13" ry="3.6" fill="#FFFFFF"/>
    <ellipse cx="31" cy="35" rx="10" ry="3.2" fill="#A2AAAD"/>
    <ellipse cx="33" cy="41" rx="7" ry="2.6" fill="#FFFFFF"/>
    <ellipse cx="31" cy="46.5" rx="4.5" ry="2.1" fill="#A2AAAD"/>
    <ellipse cx="32" cy="51" rx="2.6" ry="1.6" fill="#FFFFFF"/>
  </g>

  <!-- Yellow accent: small debris/motion flecks -->
  <circle cx="47" cy="20" r="1.8" fill="#F2B705"/>
  <circle cx="16" cy="30" r="1.4" fill="#F2B705"/>
  <circle cx="42" cy="40" r="1.3" fill="#F2B705"/>
</svg>
